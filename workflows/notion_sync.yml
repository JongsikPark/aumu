name: Push Markdown to Notion

on:
  push:
    branches: [ main ]
    paths:
      - 'aumu/aumu.md'

jobs:
  sync-to-notion:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 모든 변경 이력을 가져와 확실하게 diff를 비교합니다.

      # 1. 이번 푸시에서 변경되거나 추가된 .md 파일 목록을 가져옵니다.
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v45
        with:
          files: |
            aumu/aumu.md

      # 2. 변경된 파일이 있을 때만 노션으로 밀어 넣습니다.
      - name: Push changed markdown to Notion
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: step-security/push-md-to-notion@v1
        with:
          notion-token: ${{ secrets.NOTION_TOKEN }}
          # tj-actions에서 찾아낸 변경된 파일 경로들을 이 액션에 전달합니다.
          md-file-paths: ${{ steps.changed-files.outputs.all_changed_files }}